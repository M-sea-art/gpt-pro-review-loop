name: test

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill metadata
        shell: pwsh
        run: python scripts/quick_validate.py .

      - name: Parse PowerShell
        shell: pwsh
        run: |
          $path = "scripts/gpt_pro_review_loop.ps1"
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count) {
            $errors | ForEach-Object { "$($_.Extent.StartLineNumber):$($_.Message)" }
            exit 1
          }

      - name: Run Pester
        shell: pwsh
        run: |
          $env:GPT_PRO_REVIEW_LOOP_AUDITOR_SCRIPT = (Resolve-Path "tests/fixtures/fake_audit_codex_capabilities.py").Path
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.0 -Force
          Invoke-Pester -CI

      - name: Guard removed connector path terms
        shell: pwsh
        run: |
          $terms = @(
            ("Dev" + "Space"),
            ("cloud" + "flared"),
            ("try" + "cloudflare"),
            ("quick" + " tunnel"),
            ("Start" + "Session"),
            ("Stop" + "Session"),
            ("Preflight" + "Connector"),
            ("docs/ai" + "-bridge"),
            ("/" + "mcp")
          )
          $tracked = git ls-files
          $hits = @()
          foreach ($term in $terms) {
            $matches = Select-String -Path $tracked -Pattern ([regex]::Escape($term)) -SimpleMatch:$false -ErrorAction SilentlyContinue
            if ($matches) { $hits += $matches }
          }
          if ($hits.Count) {
            $hits | ForEach-Object { "$($_.Path):$($_.LineNumber):$($_.Line)" }
            exit 1
          }

      - name: Diff check
        shell: pwsh
        run: git diff --check
